worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Rate limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Auth subrequest map ────────────────────────────────
    # Token passed as ?token=xxx or Cookie: reale_session
    map $cookie_reale_session $session_token {
        default $cookie_reale_session;
    }

    server {
        listen 80;
        server_name _;

        # ── Portal (public login page) ───────────────────
        location / {
            root /var/www/reale-portal;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Auth API proxy ────────────────────────────────
        location /api/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://127.0.0.1:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Auth validation (internal) ────────────────────
        location = /_auth {
            internal;
            proxy_pass http://127.0.0.1:3000/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Session-Token $cookie_reale_session;
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── noVNC desktop (token-gated) ───────────────────
        location /desktop/ {
            auth_request /_auth;
            auth_request_set $auth_status $upstream_status;

            error_page 401 403 = @unauthorized;

            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # ── noVNC static assets ───────────────────────────
        location /novnc/ {
            auth_request /_auth;
            error_page 401 403 = @unauthorized;
            alias /opt/novnc/;
        }

        # ── Unauthorized redirect ─────────────────────────
        location @unauthorized {
            return 302 /?error=unauthorized;
        }
    }
}
