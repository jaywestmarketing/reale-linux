<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealE Linux — Access Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c14;
      --surface:  #0d1421;
      --border:   #1c2a42;
      --accent:   #00f5a0;
      --accent2:  #00b8d9;
      --warn:     #ff4d6d;
      --text:     #e2eaf8;
      --muted:    #5a7090;
      --glow:     0 0 40px rgba(0,245,160,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes gridPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── Orb glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,245,160,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .layout {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--glow), 0 24px 64px rgba(0,0,0,0.6);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      color: #080c14;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ── Token badge ── */
    .token-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,245,160,0.06);
      border: 1px solid rgba(0,245,160,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 28px;
    }

    .token-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    .token-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      line-height: 1.5;
    }

    /* ── Wallet input section ── */
    .input-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .wallet-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .wallet-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,245,160,0.1);
    }

    .wallet-input::placeholder { color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #080c14;
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,245,160,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
    }

    .btn-ghost:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── Status messages ── */
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }

    .status.visible { display: block; }

    .status.info {
      background: rgba(0,184,217,0.1);
      border: 1px solid rgba(0,184,217,0.3);
      color: var(--accent2);
    }

    .status.success {
      background: rgba(0,245,160,0.1);
      border: 1px solid rgba(0,245,160,0.3);
      color: var(--accent);
    }

    .status.error {
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      color: var(--warn);
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(8,12,20,0.3);
      border-top-color: #080c14;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Balance display ── */
    .balance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      display: none;
    }

    .balance-row.visible { display: flex; }
    .balance-label { color: var(--muted); }
    .balance-value { color: var(--text); font-weight: 700; }
    .balance-value.good { color: var(--accent); }
    .balance-value.bad  { color: var(--warn); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.8;
    }

    .footer a { color: var(--accent2); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ── Google Sign-In ── */
    .google-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    /* ── Collapsible wallet section ── */
    .wallet-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .wallet-section.open {
      max-height: 600px;
      opacity: 1;
    }

    .wallet-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .wallet-toggle:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .wallet-toggle .arrow {
      transition: transform 0.3s;
      display: inline-block;
    }

    .wallet-toggle.active .arrow {
      transform: rotate(180deg);
    }

    /* ── User info (shown after Google login) ── */
    .user-info {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0,245,160,0.06);
      border: 1px solid rgba(0,245,160,0.2);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .user-info.visible { display: flex; }

    .user-info .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #080c14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-info .details {
      font-size: 12px;
      line-height: 1.5;
    }

    .user-info .details .name {
      font-weight: 700;
      color: var(--text);
    }

    .user-info .details .email {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">RL</div>
      <div class="logo-text">RealE <span>Linux</span></div>
    </div>

    <div class="tagline">Browser Desktop · SPL Token Gated</div>

    <h1>Access Your<br><span>Linux Desktop</span></h1>
    <p class="subtitle">Sign in to launch a full browser-based Linux desktop.</p>

    <!-- User info (shown after login) -->
    <div class="user-info" id="userInfo">
      <div class="avatar" id="userAvatar"></div>
      <div class="details">
        <div class="name" id="userName"></div>
        <div class="email" id="userEmail"></div>
      </div>
    </div>

    <!-- Google Sign-In (rendered dynamically after config load) -->
    <div class="google-btn-wrap" id="googleBtnWrap">
      <div id="googleBtnTarget"></div>
    </div>

    <!-- Launch button (visible after Google login) -->
    <button class="btn btn-primary" id="launchBtn" onclick="launchDesktop()" style="display:none;">
      ⚡ Launch Desktop
    </button>

    <!-- Wallet auth (collapsible) -->
    <div class="divider">or use Solana wallet</div>

    <button class="wallet-toggle" id="walletToggle" onclick="toggleWalletSection()">
      <span>SPL Token Gate Access</span>
      <span class="arrow">▼</span>
    </button>

    <div class="wallet-section" id="walletSection">
      <!-- Token requirement badge -->
      <div class="token-badge" style="margin-top: 16px;">
        <div class="token-dot"></div>
        <div class="token-text">
          Requires: RealE Token (SPL)<br>
          Minimum balance: <strong id="requiredDisplay">1 REALE</strong>
        </div>
      </div>

      <label class="input-label">Wallet</label>
      <div class="input-row">
        <input
          class="wallet-input"
          id="walletAddr"
          type="text"
          placeholder="Connect wallet to sign & verify..."
          autocomplete="off"
          spellcheck="false"
          readonly
        >
        <button class="btn btn-ghost" onclick="checkBalance()" title="Check Balance">
          ◈ Check
        </button>
      </div>

      <div class="balance-row" id="balanceRow">
        <span class="balance-label">Your Balance</span>
        <span class="balance-value" id="balanceValue">—</span>
      </div>

      <button class="btn btn-primary" id="walletLaunchBtn" onclick="verifyAndLaunch()">
        ⚡ Verify &amp; Launch Desktop
      </button>

      <div style="margin-top: 12px;">
        <button class="btn btn-ghost" style="width:100%;" onclick="connectPhantom()">
          👻 Connect Phantom Wallet
        </button>
      </div>
    </div>

    <!-- Status messages -->
    <div class="status info" id="statusInfo"></div>
    <div class="status success" id="statusSuccess"></div>
    <div class="status error" id="statusError"></div>

    <!-- Footer -->
    <div class="footer">
      Powered by RealE · <a href="https://reale.one" target="_blank">reale.one</a><br>
      © Joe Wease, RealE. All rights reserved.
    </div>

  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────
  const API_BASE = '/api';

  // ── Wallet section toggle ──────────────────────────────────
  function toggleWalletSection() {
    const section = document.getElementById('walletSection');
    const toggle = document.getElementById('walletToggle');
    section.classList.toggle('open');
    toggle.classList.toggle('active');
  }

  // ── Google Sign-In callback ────────────────────────────────
  async function handleGoogleSignIn(response) {
    showStatus('info', 'Signing in with Google...');

    try {
      const res = await fetch(`${API_BASE}/auth/google`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ credential: response.credential }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Show user info
        const infoEl = document.getElementById('userInfo');
        document.getElementById('userName').textContent = data.name;
        document.getElementById('userEmail').textContent = data.email;
        document.getElementById('userAvatar').textContent = data.name.charAt(0).toUpperCase();
        infoEl.classList.add('visible');

        // Hide Google button, show launch
        document.getElementById('googleBtnWrap').style.display = 'none';
        document.getElementById('launchBtn').style.display = 'block';

        showStatus('success', `✓ Signed in as ${data.email}`);
      } else {
        showStatus('error', data.error || 'Google sign-in failed.');
      }
    } catch (err) {
      showStatus('error', 'Network error during Google sign-in.');
    }
  }

  // ── Launch desktop (after Google login) ─────────────────────
  function launchDesktop() {
    showStatus('success', '✓ Launching desktop...');
    setTimeout(() => {
      window.location.href = '/desktop/vnc.html?autoconnect=1&resize=scale&show_dot=1';
    }, 800);
  }

  // ── Helpers ─────────────────────────────────────────────────
  function showStatus(type, msg) {
    ['info','success','error'].forEach(t => {
      const el = document.getElementById('status' + t.charAt(0).toUpperCase() + t.slice(1));
      el.classList.remove('visible');
      el.textContent = '';
    });
    const el = document.getElementById('status' + type.charAt(0).toUpperCase() + type.slice(1));
    el.textContent = msg;
    el.classList.add('visible');
  }

  function setLoading(loading) {
    const btn = document.getElementById('walletLaunchBtn');
    if (!btn) return;
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Verifying on-chain...'
      : '⚡ Verify &amp; Launch Desktop';
  }

  function showBalance(balance, hasAccess) {
    const row = document.getElementById('balanceRow');
    const val = document.getElementById('balanceValue');
    row.classList.add('visible');
    val.textContent = formatBalance(balance) + ' REALE';
    val.className = 'balance-value ' + (hasAccess ? 'good' : 'bad');
  }

  function formatBalance(raw) {
    // Assumes 6 decimals — adjust if your token differs
    return (Number(raw) / 1_000_000).toLocaleString(undefined, {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
  }

  // ── Check balance (preview, no session) ─────────────────────
  async function checkBalance() {
    const wallet = document.getElementById('walletAddr').value.trim();
    if (!wallet) {
      showStatus('error', 'Please enter a wallet address.');
      return;
    }

    showStatus('info', 'Checking balance on Solana...');

    try {
      const res = await fetch(`${API_BASE}/auth/check`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet }),
      });
      const data = await res.json();

      if (!res.ok) {
        showStatus('error', data.error || 'Error checking balance.');
        return;
      }

      showBalance(data.balance, data.hasAccess);

      if (data.hasAccess) {
        showStatus('success', '✓ Sufficient balance detected. Click Launch to proceed.');
      } else {
        showStatus('error',
          `Insufficient balance.\nYou have: ${formatBalance(data.balance)} REALE\nRequired: ${formatBalance(data.required)} REALE`
        );
      }
    } catch (err) {
      showStatus('error', 'Network error. Check your connection.');
    }
  }

  // ── Get wallet provider (Phantom, Solflare, etc.) ────────────
  function getWalletProvider() {
    if (window.phantom?.solana?.isPhantom) return window.phantom.solana;
    if (window.solflare?.isSolflare) return window.solflare;
    return null;
  }

  // ── Verify and launch desktop ────────────────────────────────
  async function verifyAndLaunch() {
    const wallet = document.getElementById('walletAddr').value.trim();
    if (!wallet) {
      showStatus('error', 'Please connect a wallet first.');
      return;
    }

    const provider = getWalletProvider();
    if (!provider || !provider.isConnected) {
      showStatus('error', 'Wallet not connected. Click "Connect Phantom Wallet" first.');
      return;
    }

    setLoading(true);

    try {
      // Step 1: Request a challenge nonce from the server
      showStatus('info', 'Requesting challenge from server...');
      const nonceRes = await fetch(`${API_BASE}/auth/nonce?wallet=${encodeURIComponent(wallet)}`);
      const nonceData = await nonceRes.json();

      if (!nonceRes.ok) {
        showStatus('error', nonceData.error || 'Failed to get challenge.');
        return;
      }

      // Step 2: Sign the challenge message with the wallet
      showStatus('info', 'Please sign the message in your wallet...');
      const encodedMessage = new TextEncoder().encode(nonceData.message);
      const signResult = await provider.signMessage(encodedMessage, 'utf8');

      // signResult.signature is a Uint8Array — encode to base64
      const signatureBase64 = btoa(
        String.fromCharCode(...signResult.signature)
      );

      // Step 3: Send wallet + signature + message to verify
      showStatus('info', 'Verifying signature and token balance...');
      const res = await fetch(`${API_BASE}/auth/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
          wallet,
          signature: signatureBase64,
          message: nonceData.message,
        }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        showStatus('success', '✓ Access granted! Launching desktop...');
        setTimeout(() => {
          window.location.href = data.redirect;
        }, 1200);
      } else if (res.status === 403) {
        showBalance(data.balance, false);
        showStatus('error',
          `Access denied.\nBalance: ${formatBalance(data.balance)} REALE\nRequired: ${formatBalance(data.required)} REALE\n\nAcquire more RealE tokens to unlock access.`
        );
      } else {
        showStatus('error', data.error || 'Verification failed. Try again.');
      }
    } catch (err) {
      if (err.message?.includes('User rejected')) {
        showStatus('error', 'Signature request was rejected.');
      } else {
        showStatus('error', 'Error during verification. Try again.');
      }
    } finally {
      setLoading(false);
    }
  }

  // ── Wallet connect (Phantom / Solflare) ─────────────────────
  async function connectPhantom() {
    const provider = getWalletProvider();
    if (!provider) {
      showStatus('error', 'No Solana wallet detected. Install Phantom (phantom.app) or Solflare.');
      return;
    }

    try {
      showStatus('info', 'Connecting to wallet...');
      const resp = await provider.connect();
      const pubkey = resp.publicKey.toString();
      document.getElementById('walletAddr').value = pubkey;
      showStatus('success', `Connected: ${pubkey.slice(0,8)}...${pubkey.slice(-6)}`);
      // Auto-check balance after connect
      setTimeout(checkBalance, 600);
    } catch (err) {
      showStatus('error', 'Wallet connection cancelled or failed.');
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'unauthorized') {
      showStatus('error', 'Session expired or invalid. Please sign in again.');
    }

    // Fetch server config and render Google Sign-In button
    try {
      const res = await fetch(`${API_BASE}/config`);
      const cfg = await res.json();

      if (cfg.googleClientId) {
        // Wait for GSI library to load
        const waitForGoogle = () => new Promise((resolve) => {
          if (window.google?.accounts?.id) return resolve();
          const check = setInterval(() => {
            if (window.google?.accounts?.id) { clearInterval(check); resolve(); }
          }, 100);
        });

        await waitForGoogle();

        google.accounts.id.initialize({
          client_id: cfg.googleClientId,
          callback: handleGoogleSignIn,
        });

        google.accounts.id.renderButton(
          document.getElementById('googleBtnTarget'),
          {
            type: 'standard',
            shape: 'rectangular',
            theme: 'filled_black',
            text: 'signin_with',
            size: 'large',
            logo_alignment: 'left',
            width: 380,
          }
        );
      } else {
        // No Google client ID configured — hide Google section
        document.getElementById('googleBtnWrap').style.display = 'none';
      }
    } catch (err) {
      console.error('Failed to load config:', err);
      document.getElementById('googleBtnWrap').style.display = 'none';
    }
  });
</script>
</body>
</html>
